<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js" defer></script>
    <title>CatchTheCoin</title>
</head>

<body class="bg-secondary">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a href="" class="navbar-brand">CatchTheCoin</a>
            <ul class="nav ms-auto">
                <li class="nav-item"><a href="" class="nav-link active">Home</a></li>
                <li class="nav-item"><a href="" class="nav-link">Regole</a></li>
                <li class="nav-item"><a href="" class="nav-link">Classifica</a></li>
            </ul>
        </div>
    </nav>

    <div class="bg-primary text-white text-center p-4">
        <h1>Catch the Coin!</h1>
        <p class="mb-0">Clicca le monete, evita i teschi. Hai 20 secondi.</p>
    </div>

    <div class="container mt-4">

        <div class="row text-white text-center mb-4">
            <div class="col">
                <div class="bg-black p-4 rounded-4">
                    <h5>Punteggio</h5>
                    <h2 id="spnPunteggio">0</h2>
                </div>
            </div>
            <div class="col">
                <div class="bg-black p-4 rounded-4">
                    <h5>Tempo</h5>
                    <h2 id="spnTimer">20</h2>
                </div>
            </div>
            <div class="col">
                <div class="bg-black p-4 rounded-4">
                    <h5>Monete prese</h5>
                    <h2 id="spnMonete">0</h2>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <button class="btn btn-success me-2 fs-5" id="btnStart" onclick="avviaPartita()">Avvia partita</button>
            <button class="btn btn-danger fs-5" id="btnStop" disabled onclick="fermaPartita()">Ferma</button>
        </div>

        <div id="campo" class="bg-white rounded-4 mt-3"
             style="position:relative; width:600px; height:400px; overflow:hidden;">
        </div>

        <div id="risultato" class="mt-3"></div>

    </div>

    <!-- Nav tabs -->
    <ul class="nav nav-tabs" id="myTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button
                class="nav-link active"
                id="home-tab"
                data-bs-toggle="tab"
                data-bs-target="#home"
                type="button"
                role="tab"
                aria-controls="home"
                aria-selected="true"
            >
                Home
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button
                class="nav-link"
                id="profile-tab"
                data-bs-toggle="tab"
                data-bs-target="#profile"
                type="button"
                role="tab"
                aria-controls="profile"
                aria-selected="false"
            >
                Profile
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button
                class="nav-link"
                id="messages-tab"
                data-bs-toggle="tab"
                data-bs-target="#messages"
                type="button"
                role="tab"
                aria-controls="messages"
                aria-selected="false"
            >
                Messages
            </button>
        </li>
    </ul>
    
    <!-- Tab panes -->
    <div class="tab-content">
        <div
            class="tab-pane active"
            id="home"
            role="tabpanel"
            aria-labelledby="home-tab"
        >
             home 
        </div>
        <div
            class="tab-pane"
            id="profile"
            role="tabpanel"
            aria-labelledby="profile-tab"
        >
             profile 
        </div>
        <div
            class="tab-pane"
            id="messages"
            role="tabpanel"
            aria-labelledby="messages-tab"
        >
             messages 
        </div>
    </div>
    

</body>
</html>
