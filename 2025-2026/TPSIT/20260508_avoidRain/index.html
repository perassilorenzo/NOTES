<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Avoid The Rain</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>AVOID THE RAIN</h1>

    <div class="game">

        <!-- PLAYER -->
        <div class="player"></div>

        <!-- GOCCE -->
        <div class="drop drop1"></div>
        <div class="drop drop2"></div>
        <div class="drop drop3"></div>
        <div class="drop drop4"></div>
        <div class="drop drop5"></div>

        <!-- SOLE -->
        <div class="bonus" id="bonus"></div>

    </div>

    <div class="info">
        Muovi il secchiello evitando la pioggia e cerca di prendere il sole!
    </div>

    <div class="punteggio">
        
    </div>

    <script src="script.js"></script>


    <!-- Button trigger modal -->
    <button
        type="button"
        class="btn btn-primary btn-lg"
        data-bs-toggle="modal"
        data-bs-target="#modalId"
    >
        Launch
    </button>

    <!-- Modal -->
    <div
        class="modal fade"
        id="modalId"
        tabindex="-1"
        role="dialog"
        aria-labelledby="modalTitleId"
        aria-hidden="true"
    >
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitleId">
                        Modal title
                    </h5>
                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Close"
                    ></button>
                </div>
                <div class="modal-body">
                    <div class="container-fluid">Add rows here</div>
                </div>
                <div class="modal-footer">
                    <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal"
                    >
                        Close
                    </button>
                    <button type="button" class="btn btn-primary">Save</button>
                </div>
            </div>
        </div>
    </div>
    
</body>

</html>
